name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Test, build and publish
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v6

      - name: Configurar Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Descargar dependencias
        run: go mod download

      - name: Ejecutar pruebas
        run: go test ./...

      - name: Ejecutar go vet
        run: go vet ./...

      - name: Definir nombre de imagen
        id: image
        shell: bash
        run: |
          IMAGE_BASE="ghcr.io/${GITHUB_REPOSITORY,,}"
          IMAGE="${IMAGE_BASE}:${GITHUB_SHA}"

          echo "image_base=${IMAGE_BASE}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Autenticarse en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Construir y publicar imagen
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.image }}
            ${{ steps.image.outputs.image_base }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy with Docker Compose
    needs:
      - build

    runs-on:
      - self-hosted
      - Linux
      - X64

    steps:
      - name: Autenticarse en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Actualizar aplicaciones Go
        shell: bash
        env:
          APP_IMAGE: ${{ needs.build.outputs.image }}
          DEPLOY_DIR: /home/lenovo_t480/proyectos/plataforma-go
        run: |
          set -euo pipefail

          cd "$DEPLOY_DIR"

          APP_IMAGE="$APP_IMAGE" docker compose pull app1 app2

          APP_IMAGE="$APP_IMAGE" docker compose up \
            -d \
            --no-deps \
            --no-build \
            app1 app2

          docker compose ps

      - name: Verificar despliegue
        shell: bash
        run: |
          set -euo pipefail

          for intento in {1..12}; do
            if curl \
              --silent \
              --show-error \
              --fail \
              --insecure \
              https://localhost:8443/health/ready; then
              echo
              echo "Despliegue verificado correctamente"
              exit 0
            fi

            echo "Esperando a que la aplicación quede lista... intento ${intento}/12"
            sleep 5
          done

          echo "La aplicación no quedó lista después del despliegue" >&2
          docker compose -f /home/lenovo_t480/proyectos/plataforma-go/compose.yaml ps
          exit 1
