global
    log stdout format raw local0

defaults
    log global
    mode http

    option httplog
    option dontlognull

    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend http_front
    bind *:80

    http-request redirect scheme https code 301

frontend https_front
    bind *:443 ssl crt /usr/local/etc/haproxy/certs/plataforma.pem

    default_backend go_apps

backend go_apps
    balance roundrobin

    option httpchk GET /health/ready
    http-check expect status 200

    server app1 app1:8080 check inter 2s fall 3 rise 2
    server app2 app2:8080 check inter 2s fall 3 rise 2

listen statistics
    bind *:8404

    stats enable
    stats uri /stats
    stats refresh 5s
